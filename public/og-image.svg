<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#00f0ff" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Decorative shapes -->
  <!-- Enemy diamond (red) -->
  <polygon points="200,180 230,210 200,240 170,210" fill="#ff3344" opacity="0.6" filter="url(#glow)"/>
  <!-- Enemy triangle (pink) -->
  <polygon points="950,150 970,185 930,185" fill="#ff44aa" opacity="0.5" filter="url(#glow)"/>
  <!-- Enemy pentagon (orange) -->
  <polygon points="1020,400 1040,420 1032,445 1008,445 1000,420" fill="#ff8800" opacity="0.5" filter="url(#glow)"/>
  <!-- Enemy hex (purple) -->
  <polygon points="150,420 170,408 190,420 190,445 170,457 150,445" fill="#aa44ff" opacity="0.4" filter="url(#glow)"/>

  <!-- XP orbs -->
  <polygon points="300,380 310,370 320,380 310,390" fill="#00ff88" opacity="0.5" filter="url(#glow)"/>
  <polygon points="850,460 858,452 866,460 858,468" fill="#00ff88" opacity="0.4" filter="url(#glow)"/>

  <!-- Player hexagon (center-ish) -->
  <polygon points="600,250 630,267 630,302 600,320 570,302 570,267" fill="#00eeff" opacity="0.8" filter="url(#glow-strong)"/>
  <polygon points="600,270 612,278 612,295 600,303 588,295 588,278" fill="#ffffff" opacity="0.9"/>

  <!-- Projectile lines -->
  <line x1="620" y1="275" x2="700" y2="240" stroke="#00ccff" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <line x1="580" y1="295" x2="500" y2="350" stroke="#00ccff" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <line x1="615" y1="305" x2="680" y2="370" stroke="#ffffff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>

  <!-- Title -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="80" fill="url(#title)" filter="url(#glow-strong)">VOID SURVIVORS</text>

  <!-- Subtitle -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#e0e0f0" opacity="0.6" letter-spacing="8">SURVIVE THE VOID. BECOME THE WEAPON.</text>

  <!-- Corner branding -->
  <text x="600" y="590" text-anchor="middle" font-family="monospace" font-size="14" fill="#00f0ff" opacity="0.4">void-survivors.vercel.app</text>

  <!-- Border glow -->
  <rect x="2" y="2" width="1196" height="626" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.15" rx="4"/>
</svg>
